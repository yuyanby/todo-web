<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的任务清单 - Todo Web</title>
    <link rel="stylesheet" href="css/style.css?v=2.3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // 硬刷新 - 清除旧缓存
        (function() {
            var key = 'todo_web_v2_3';
            var lastVer = localStorage.getItem('todo_web_ver');
            if (lastVer !== key) {
                localStorage.setItem('todo_web_ver', key);
                // 强制从服务器加载最新资源
                var links = document.querySelectorAll('link[rel="stylesheet"]');
                for (var i = 0; i < links.length; i++) {
                    links[i].href = links[i].href.split('?')[0] + '?v=' + Date.now();
                }
            }
        })();
    </script>
</head>
<body>
    <!-- 移动端顶部导航栏 -->
    <div class="mobile-topbar" id="mobile-topbar">
        <button class="mobile-menu-btn" id="mobile-menu-btn" type="button" aria-label="打开菜单">
            <span class="hamburger-icon">☰</span>
        </button>
        <span class="mobile-title">📋 任务清单</span>
    </div>
    
    <!-- 遮罩层 -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMobileSidebar()"></div>
    
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fas fa-check-circle"></i>
                <span>Todo Web</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-filter="all">
                    <i class="fas fa-list"></i>
                    <span>全部任务</span>
                    <span class="badge" id="count-all">18</span>
                </a>
                <a href="#" class="nav-item" data-filter="pending">
                    <i class="fas fa-clock"></i>
                    <span>待完成</span>
                    <span class="badge" id="count-pending">18</span>
                </a>
                <a href="#" class="nav-item" data-filter="completed">
                    <i class="fas fa-check"></i>
                    <span>已完成</span>
                    <span class="badge" id="count-completed">0</span>
                </a>
                <div class="nav-divider"></div>
                <a href="#" class="nav-item" data-filter="wedding">
                    <i class="fas fa-heart"></i>
                    <span>婚礼</span>
                    <span class="badge" id="count-wedding">7</span>
                </a>
                <a href="#" class="nav-item" data-filter="newhome">
                    <i class="fas fa-home"></i>
                    <span>新房</span>
                    <span class="badge" id="count-newhome">11</span>
                </a>
                <div class="nav-divider"></div>
                <a href="#" class="nav-item" data-filter="hermes">
                    <i class="fas fa-robot"></i>
                    <span>AI执行</span>
                    <span class="badge" id="count-hermes">11</span>
                </a>
                <a href="#" class="nav-item" data-filter="user">
                    <i class="fas fa-user"></i>
                    <span>我执行</span>
                    <span class="badge" id="count-user">7</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="header">
                <div class="header-left">
                    <h1>📋 任务清单</h1>
                    <p class="subtitle">婚礼 & 新房采购计划</p>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="搜索任务..." id="search-input">
                    </div>
                    <button class="btn btn-primary" id="add-task-btn">
                        <i class="fas fa-plus"></i>
                        添加任务
                    </button>
                </div>
            </header>

            <!-- 统计卡片 -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon" style="background: #667eea;">
                        <i class="fas fa-tasks"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-total">18</span>
                        <span class="stat-label">总任务</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #e74c3c;">
                        <i class="fas fa-fire"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-high">5</span>
                        <span class="stat-label">高优先级</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #f39c12;">
                        <i class="fas fa-calendar-alt"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-due">5</span>
                        <span class="stat-label">即将到期</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #27ae60;">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="stat-hermes">11</span>
                        <span class="stat-label">AI执行</span>
                    </div>
                </div>
            </div>

            <!-- 任务列表 -->
            <div class="task-list-container">
                <div class="task-list-header">
                    <h2>任务列表</h2>
                    <div class="filter-tags">
                        <button class="filter-tag active" data-priority="all">全部</button>
                        <button class="filter-tag" data-priority="high">🔴 高优先级</button>
                        <button class="filter-tag" data-priority="medium">🟡 中优先级</button>
                        <button class="filter-tag" data-priority="low">🟢 低优先级</button>
                    </div>
                </div>
                <div class="task-list" id="task-list">
                    <!-- 任务将通过 JS 动态加载 -->
                </div>
            </div>
        </main>
    </div>

    <!-- 添加任务弹窗 -->
    <div class="modal" id="add-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加新任务</h3>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <form id="add-task-form">
                <div class="form-group">
                    <label>任务内容</label>
                    <input type="text" id="task-content" placeholder="输入任务内容..." required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>分类</label>
                        <select id="task-category">
                            <option value="婚礼">婚礼</option>
                            <option value="新房">新房</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>优先级</label>
                        <select id="task-priority">
                            <option value="high">🔴 高</option>
                            <option value="medium">🟡 中</option>
                            <option value="low">🟢 低</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>截止日期</label>
                        <input type="date" id="task-due">
                    </div>
                    <div class="form-group">
                        <label>负责人</label>
                        <select id="task-owner">
                            <option value="hermes">🤖 Hermes (AI)</option>
                            <option value="user">👤 我自己</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-add">取消</button>
                    <button type="submit" class="btn btn-primary">添加任务</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/data.js?v=2.3"></script>
    <script src="js/app.js?v=2.3"></script>
    <script>
        // 移动端侧边栏切换（内联函数，确保微信浏览器也能触发）
        function toggleMobileSidebar() {
            var sidebar = document.getElementById('sidebar');
            var overlay = document.getElementById('sidebar-overlay');
            var topbar = document.getElementById('mobile-topbar');
            if (sidebar) {
                sidebar.classList.toggle('active');
            }
            if (overlay) {
                overlay.classList.toggle('active');
            }
            if (topbar) {
                topbar.classList.toggle('sidebar-open');
            }
        }

        // 页面加载完成后绑定事件
        (function() {
            // 菜单按钮
            var menuBtn = document.getElementById('mobile-menu-btn');
            if (menuBtn) {
                // 同时绑定 click 和 touchend，兼容微信浏览器
                function handleMenuClick(e) {
                    if (e) e.preventDefault();
                    if (e) e.stopPropagation ? e.stopPropagation() : (e.cancelBubble = true);
                    toggleMobileSidebar();
                    return false;
                }
                menuBtn.onclick = handleMenuClick;
                menuBtn.ontouchend = function(e) {
                    e.preventDefault();
                    toggleMobileSidebar();
                };
            }
            
            // 点击导航项后关闭侧边栏（移动端）
            var navItems = document.querySelectorAll('.nav-item');
            for (var i = 0; i < navItems.length; i++) {
                (function(item) {
                    item.addEventListener('click', function(e) {
                        if (window.innerWidth <= 768) {
                            var sidebar = document.getElementById('sidebar');
                            var overlay = document.getElementById('sidebar-overlay');
                            if (sidebar) sidebar.classList.remove('active');
                            if (overlay) overlay.classList.remove('active');
                            var topbar = document.getElementById('mobile-topbar');
                            if (topbar) topbar.classList.remove('sidebar-open');
                        }
                    });
                })(navItems[i]);
            }
        })();
    </script>
</body>
</html>
